<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="GreenBack">
        <div class="gridBox">
            <input type="text" id="value1">
            <select class="selection" id="operation">
                <option>+</option>
                <option>-</option>
                <option>*</option>
                <option>/</option>
            </select>
            <input type="text" id="value2">
        </div>
        
        <button id="calcbutton" onclick="calculate()">подсчитать</button>
        
        <div class="results" id="result"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
